<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#16130F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ORIGIN">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>ORIGIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ ORIGIN v1.0 — dark-warm theme ============ */
:root{
  --bg:#16130F; --surface:#211D17; --surface2:#2A251D; --surface3:#332D24;
  --line:rgba(237,230,218,.09); --line2:rgba(237,230,218,.16);
  --text:#EDE6DA; --muted:#9C9285; --faint:#6E665B;
  --gold:#E3B341; --gold-dim:rgba(227,179,65,.14);
  --danger:#C96A6A;
  --c01:#D4894A; --c02:#7FA65A; --c03:#5B8FB9; --c04:#E3B341; --c05:#9A7FB8;
  --c06:#C96A6A; --c07:#D98CB3; --c08:#5FB0A5; --c09:#8A8578; --c10:#4A443B;
  --radius:18px; --radius-s:12px;
  --font-d:'Fraunces',Georgia,serif;
  --font-b:'Manrope',system-ui,sans-serif;
  --font-m:'JetBrains Mono',ui-monospace,monospace;
  --dur:480ms; --ease:cubic-bezier(.22,.9,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;
  overscroll-behavior:none;overflow:hidden;
  background-image:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(227,179,65,.05),transparent 60%)}
#app{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}

/* ---- top bar ---- */
#topbar{display:flex;align-items:center;gap:10px;min-height:56px;z-index:5;
  padding:calc(14px + env(safe-area-inset-top,0px)) 18px 10px;
  border-bottom:1px solid var(--line)}
#topbar .back{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);background:var(--surface);
  display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex:0 0 auto}
#topbar .back.show{display:flex}
#topbar h1{font-family:var(--font-d);font-weight:560;font-size:22px;letter-spacing:.2px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .wordmark{font-family:var(--font-d);font-weight:640;letter-spacing:3.5px;font-size:17px;color:var(--gold)}
#topbar .sub{font-size:11.5px;color:var(--faint);font-family:var(--font-m);letter-spacing:.4px}

/* ---- stage & view transitions (motion design §6bis) ---- */
#stage{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:4px 18px 24px;
  scrollbar-width:none}
.view::-webkit-scrollbar{display:none}
.view.enter{animation:bloomIn var(--dur) var(--ease) both}
.view.leave{animation:sinkOut 420ms cubic-bezier(.5,0,.75,.4) both;pointer-events:none}
@keyframes bloomIn{from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
@keyframes sinkOut{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.7) translateY(46px)}}
@media (prefers-reduced-motion:reduce){
  .view.enter,.view.leave{animation-duration:1ms}
  *{transition-duration:1ms!important}
}

/* ---- tab bar ---- */
#tabbar{display:flex;border-top:1px solid var(--line);background:rgba(22,19,15,.92);
  backdrop-filter:blur(14px);padding:8px 10px calc(10px + env(safe-area-inset-bottom));z-index:6}
#tabbar button{flex:1;background:none;border:none;color:var(--faint);font-family:var(--font-b);
  font-size:10.5px;font-weight:600;letter-spacing:.3px;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:6px 0;cursor:pointer;border-radius:12px;transition:color .25s}
#tabbar button svg{width:21px;height:21px;stroke-width:1.7}
#tabbar button.active{color:var(--gold)}
#tabbar button:active{transform:scale(.94)}

/* ---- canvas grid ---- */
.canvas-wrap{display:flex;flex-direction:column;min-height:100%;justify-content:flex-end;padding-bottom:6px}
.obj-grid{display:grid;gap:12px}
.obj-btn{aspect-ratio:1;border-radius:var(--radius);border:1px solid var(--line);
  background:linear-gradient(160deg,var(--surface2),var(--surface));position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;
  transition:transform .18s var(--ease);overflow:hidden;user-select:none;-webkit-user-select:none}
.obj-btn:active{transform:scale(.93)}
.obj-btn .tint{position:absolute;inset:0;opacity:.13;pointer-events:none}
.obj-btn .ic{width:30px;height:30px;display:flex;align-items:center;justify-content:center;z-index:1}
.obj-btn .ic svg{width:28px;height:28px;stroke-width:1.6}
.obj-btn .nm{font-size:11.5px;font-weight:600;color:var(--text);z-index:1;padding:0 6px;text-align:center;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obj-btn .badge{position:absolute;top:8px;right:8px;min-width:20px;height:20px;border-radius:10px;
  background:var(--surface3);border:1px solid var(--line2);color:var(--gold);font-family:var(--font-m);
  font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;z-index:2}
.obj-btn.pulse{animation:pulse .4s var(--ease)}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(.88)}100%{transform:scale(1)}}
.grid-empty{aspect-ratio:1;border-radius:var(--radius);border:1px dashed var(--line)}
.canvas-hint{color:var(--faint);font-size:12.5px;text-align:center;padding:20px 30px;line-height:1.6}

/* ---- alias breadcrumb ---- */
.crumb{font-family:var(--font-m);font-size:11.5px;color:var(--muted);letter-spacing:.3px;margin:2px 2px 14px}
.crumb b{color:var(--gold);font-weight:500}

/* ---- card (activation) ---- */
.card-head{display:flex;align-items:center;gap:12px;margin:6px 2px 18px}
.card-head .ic{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card-head .ic svg{width:24px;height:24px;stroke-width:1.7}
.card-head h2{font-family:var(--font-d);font-weight:560;font-size:24px;line-height:1.15}
.card-head .chain{font-family:var(--font-m);font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.3px}
.fld{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-s);
  padding:13px 15px;margin-bottom:11px;animation:fldIn .5s var(--ease) both}
@keyframes fldIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--faint);margin-bottom:8px}
.fld input[type=time],.fld input[type=number],.fld input[type=text],.fld input[type=date],
.fld textarea,.fld select{width:100%;background:var(--surface2);border:1px solid var(--line);
  border-radius:9px;color:var(--text);font-family:var(--font-m);font-size:15px;padding:10px 12px;outline:none}
.fld textarea{font-family:var(--font-b);min-height:72px;resize:vertical;line-height:1.5}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim)}
.fld .row{display:flex;gap:8px;align-items:center}
.fld .row input{flex:1}
.mini-btn{background:var(--surface2);border:1px solid var(--line2);color:var(--muted);border-radius:9px;
  padding:9px 13px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font-b);
  transition:all .2s}
.mini-btn:active{transform:scale(.95)}
.mini-btn.gold{color:var(--gold);border-color:rgba(227,179,65,.35)}
.mini-btn.rec{color:#fff;background:var(--danger);border-color:var(--danger);animation:blink 1.1s infinite}
@keyframes blink{50%{opacity:.55}}
.stars{display:flex;gap:8px}
.stars .st{width:38px;height:38px;cursor:pointer;color:var(--faint);transition:transform .15s,color .2s;
  display:flex;align-items:center;justify-content:center}
.stars .st svg{width:30px;height:30px}
.stars .st.on{color:var(--gold);transform:scale(1.06)}
.stars .st:active{transform:scale(.85)}
.unit-lab{font-family:var(--font-m);color:var(--muted);font-size:13px;padding:0 4px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line2);background:var(--surface2);color:var(--muted);border-radius:999px;
  padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .22s var(--ease);
  display:inline-flex;align-items:center;gap:6px;animation:chipIn .35s var(--ease) both}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.chip .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.chip.on{color:var(--text);background:var(--surface3);border-color:var(--tagc,var(--gold));
  box-shadow:0 0 0 1px var(--tagc,var(--gold)) inset}
.chip.add{border-style:dashed;color:var(--faint)}
.tag-cat-block{margin-bottom:10px}
.tag-cat-block .cat-name{font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:7px}
.counter-big{display:flex;align-items:center;gap:16px}
.counter-big .num{font-family:var(--font-m);font-size:34px;color:var(--gold)}
.counter-big .lab{font-size:12px;color:var(--muted)}
.save-btn{width:100%;background:var(--gold);color:#221B0C;border:none;border-radius:14px;padding:16px;
  font-family:var(--font-b);font-weight:700;font-size:15.5px;letter-spacing:.3px;cursor:pointer;margin-top:6px;
  transition:transform .18s var(--ease)}
.save-btn:active{transform:scale(.965)}
.del-link{width:100%;text-align:center;color:var(--danger);font-size:13px;font-weight:600;background:none;
  border:none;padding:14px;cursor:pointer;opacity:.8}

/* ---- today ---- */
.today-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
.today-center{flex:1;text-align:center;min-width:0}
.today-center .date-lab{font-family:var(--font-d);font-size:20px;font-weight:560;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-center .date-sub{font-family:var(--font-m);font-size:11px;color:var(--faint);letter-spacing:.5px;margin-top:2px}
.cal-toggle{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line2);
  color:var(--muted);border-radius:999px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;
  font-family:var(--font-b);transition:all .25s}
.cal-toggle.open{color:var(--gold);border-color:rgba(227,179,65,.4)}
.cal-toggle svg{width:15px;height:15px}

/* 3D calendar carousel */
.cal-panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .55s var(--ease),opacity .45s;margin-bottom:6px}
.cal-panel.open{max-height:360px;opacity:1}
.cal-drum{position:relative;height:300px;perspective:900px;perspective-origin:50% 40%;
  touch-action:pan-y;user-select:none;-webkit-user-select:none}
.cal-month{position:absolute;top:10px;left:50%;width:242px;margin-left:-121px;
  background:linear-gradient(170deg,var(--surface2),var(--surface));border:1px solid var(--line2);
  border-radius:16px;padding:12px 12px 14px;transition:transform .5s var(--ease),opacity .5s var(--ease);
  transform-style:preserve-3d;backface-visibility:hidden}
.cal-month.pos-c{transform:translateX(0) translateZ(0) rotateY(0) scale(1);opacity:1;z-index:3}
.cal-month.pos-l{transform:translateX(-172px) translateZ(-150px) rotateY(38deg) scale(.86);opacity:.45;z-index:1}
.cal-month.pos-r{transform:translateX(172px) translateZ(-150px) rotateY(-38deg) scale(.86);opacity:.45;z-index:1}
.cal-month.pos-farl{transform:translateX(-330px) translateZ(-320px) rotateY(58deg) scale(.7);opacity:0;z-index:0}
.cal-month.pos-farr{transform:translateX(330px) translateZ(-320px) rotateY(-58deg) scale(.7);opacity:0;z-index:0}
.cal-month:not(.pos-c){pointer-events:none}
.cal-month.pos-c h4{cursor:pointer}
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:8px 2px 4px}
.pk{padding:16px 4px;border-radius:11px;background:var(--surface3);border:1px solid var(--line);
  color:var(--text);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.pk:active{transform:scale(.94)}
.pk.now{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.cal-month h4{font-family:var(--font-d);font-size:15px;font-weight:560;text-align:center;margin-bottom:8px;
  color:var(--text);text-transform:capitalize}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-week span{text-align:center;font-family:var(--font-m);font-size:9px;color:var(--faint);text-transform:uppercase}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-m);font-size:11.5px;color:var(--muted);border-radius:50%;cursor:pointer}
.cal-d.dim{color:var(--faint);opacity:.35}
.cal-d.today{border:1.5px solid var(--gold);color:var(--gold)}
.cal-d.sel{background:var(--gold);color:#221B0C;font-weight:600}
.cal-d .mk{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.cal-d .mk i{width:3.5px;height:3.5px;border-radius:50%;background:var(--gold)}
.cal-d .mk i.busy{background:var(--danger);width:9px;border-radius:2px;height:3px}
.cal-d .mkt{position:absolute;top:1px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.cal-d .mkt i{width:4px;height:4px;border-radius:50%}
.cal-d .mkt i.p{background:#E37FB4}
.cal-d .mkt i.o{background:#5FB8E8}
.cal-hint{text-align:center;color:var(--faint);font-size:10.5px;font-family:var(--font-m);letter-spacing:.5px;margin-top:-6px}

/* day status */
.day-status{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.ds-btn{flex:0 0 auto;border-radius:999px;border:1px solid var(--line2);background:var(--surface);
  color:var(--muted);padding:8px 15px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .25s}
.ds-btn.busy-on{background:rgba(201,106,106,.16);border-color:var(--danger);color:var(--danger)}
.ds-note{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:999px;color:var(--text);
  font-size:12.5px;padding:9px 14px;outline:none;font-family:var(--font-b)}
.ds-note::placeholder{color:var(--faint)}

/* timeline */
.tl{position:relative;padding-left:4px}
.tl-item{display:flex;gap:13px;padding:8px 2px;margin-bottom:7px;border-radius:12px;cursor:pointer;position:relative;
  animation:fldIn .45s var(--ease) both}
.tl-item:active{background:var(--surface)}
.tl-time{font-family:var(--font-m);font-size:12px;color:var(--muted);width:44px;flex:0 0 auto;
  height:34px;display:flex;align-items:center}
.tl-ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;z-index:1;border:1px solid var(--line)}
.tl-ic svg{width:17px;height:17px;stroke-width:1.8}
.tl-body{flex:1;min-width:0;padding-top:2px}
.tl-body .t1{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tl-body .t1 .meta{font-family:var(--font-m);font-size:11px;color:var(--muted);font-weight:400}
.tl-body .t2{color:var(--muted);font-size:12.5px;line-height:1.45;margin-top:3px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tl-body .tchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tl-body .tchips i{font-style:normal;font-size:10.5px;padding:2.5px 8px;border-radius:999px;font-weight:600}
.tl-planned{opacity:.75}
.tl-planned .tl-ic{border-style:dashed}
.pl-mark{font-size:10px;font-family:var(--font-m);letter-spacing:.5px;padding:2px 7px;border-radius:5px;
  background:var(--gold-dim);color:var(--gold)}
.pl-done{background:rgba(127,166,90,.18);color:var(--c02)}
.empty-day{text-align:center;color:var(--faint);padding:44px 30px;font-size:13px;line-height:1.7}
.empty-day .big{font-family:var(--font-d);font-size:17px;color:var(--muted);margin-bottom:6px}
.fab-row{display:flex;gap:9px;margin:14px 0 4px}
.fab-row .mini-btn{flex:1;padding:13px;text-align:center;font-size:13px}

/* ---- lists / settings rows ---- */
.sec-lab{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);
  margin:20px 4px 10px}
.rowbtn{width:100%;display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius-s);padding:14px 15px;margin-bottom:9px;cursor:pointer;color:var(--text);
  font-family:var(--font-b);text-align:left;transition:transform .15s}
.rowbtn:active{transform:scale(.98)}
.rowbtn .ric{width:36px;height:36px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--muted)}
.rowbtn .ric svg{width:18px;height:18px;stroke-width:1.7}
.rowbtn .rl{flex:1;min-width:0}
.rowbtn .rl b{display:block;font-size:14.5px;font-weight:600}
.rowbtn .rl span{display:block;font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.rowbtn .chev{color:var(--faint);flex:0 0 auto}
.rowbtn .chev svg{width:16px;height:16px}
.switch{position:relative;width:46px;height:27px;flex:0 0 auto}
.switch input{opacity:0;width:0;height:0}
.switch i{position:absolute;inset:0;background:var(--surface3);border:1px solid var(--line2);border-radius:999px;
  cursor:pointer;transition:.3s}
.switch i:before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--muted);
  top:2.5px;left:3px;transition:.3s var(--ease)}
.switch input:checked+i{background:var(--gold-dim);border-color:var(--gold)}
.switch input:checked+i:before{left:21px;background:var(--gold)}

/* ---- exchange ---- */
.xc-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;margin-bottom:12px}
.xc-card h3{font-family:var(--font-d);font-weight:560;font-size:16.5px;margin-bottom:4px}
.xc-card p{color:var(--muted);font-size:12.5px;line-height:1.55;margin-bottom:12px}
.xc-card .btns{display:flex;gap:8px;flex-wrap:wrap}
.cache-stats{display:flex;gap:10px}
.cache-stats .cs{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:12px;
  padding:11px;text-align:center}
.cache-stats .cs b{display:block;font-family:var(--font-m);font-size:16px;color:var(--gold);font-weight:500}
.cache-stats .cs span{font-size:10px;color:var(--faint);letter-spacing:.4px;text-transform:uppercase}

/* ---- modal ---- */
#modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center}
#modal-root.show{display:flex}
#modal-root .scrim{position:absolute;inset:0;background:rgba(10,8,6,.6);backdrop-filter:blur(4px);
  animation:fadeIn .3s both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{position:relative;width:100%;max-width:560px;max-height:82dvh;overflow-y:auto;background:var(--surface);
  border:1px solid var(--line2);border-radius:22px 22px 0 0;padding:10px 18px calc(22px + env(safe-area-inset-bottom));
  animation:sheetUp .45s var(--ease) both}
@keyframes sheetUp{from{transform:translateY(60%);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet .grip{width:38px;height:4px;border-radius:2px;background:var(--line2);margin:4px auto 14px}
.sheet h3{font-family:var(--font-d);font-weight:560;font-size:19px;margin-bottom:14px}
.sheet .fld{background:var(--surface2)}
.sheet .fld input,.sheet .fld textarea,.sheet .fld select{background:var(--surface3)}

/* palette & icon pickers */
.pal{display:flex;flex-wrap:wrap;gap:10px}
.pal .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s}
.pal .sw.on{border-color:var(--text);transform:scale(1.12)}
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.icon-grid .ig{aspect-ratio:1;border-radius:11px;background:var(--surface3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.icon-grid .ig svg{width:20px;height:20px;stroke-width:1.6}
.icon-grid .ig.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.wk-row{display:flex;gap:6px}
.wk{flex:1;text-align:center;padding:9px 0;border-radius:9px;border:1px solid var(--line2);background:var(--surface3);
  color:var(--muted);font-size:11.5px;font-weight:700;cursor:pointer}
.wk.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--surface3);border:1px solid var(--line2);color:var(--text);padding:11px 20px;border-radius:999px;
  font-size:13px;font-weight:600;opacity:0;transition:all .35s var(--ease);z-index:60;pointer-events:none;
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* manager helpers */
.inline-edit{display:flex;gap:8px;margin-bottom:10px}
.inline-edit input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  color:var(--text);padding:11px 13px;font-size:14px;outline:none;font-family:var(--font-b)}
.tagline{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.tagline .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;cursor:pointer}
.tagline b{flex:1;font-weight:600;font-size:14px}
.tagline .x{color:var(--faint);background:none;border:none;cursor:pointer;padding:6px}
.tagline .x svg{width:15px;height:15px}
.cellpick{display:grid;gap:8px}
.cellpick .cp{aspect-ratio:1;border-radius:12px;border:1px dashed var(--line2);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--faint);font-size:10px;overflow:hidden}
.cellpick .cp.filled{border-style:solid;background:var(--surface2);color:var(--text)}
.cellpick .cp svg{width:18px;height:18px}
.prop-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
.prop-row .pl{flex:1}
.prop-row .pl b{font-size:14px;font-weight:600;display:block}
.prop-row .pl span{font-size:11.5px;color:var(--faint)}
.prop-params{padding:4px 4px 12px 4px}
.prop-params .row{display:flex;gap:8px;align-items:center;margin-top:8px}
.prop-params label{font-size:11.5px;color:var(--muted);flex:0 0 auto}
.prop-params input,.prop-params select{flex:1;background:var(--surface2);border:1px solid var(--line);
  border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none}
.notice{background:var(--gold-dim);border:1px solid rgba(227,179,65,.3);border-radius:var(--radius-s);
  color:var(--text);font-size:12.5px;padding:12px 14px;line-height:1.5;margin-bottom:12px}

/* ===== v1.1: light theme ===== */
html[data-theme=light]{
  --bg:#F2ECDF; --surface:#FBF8F1; --surface2:#F0EADC; --surface3:#E7DFCC;
  --line:rgba(44,37,26,.12); --line2:rgba(44,37,26,.22);
  --text:#2C251A; --muted:#6E6452; --faint:#99907E;
  --gold:#A87A16; --gold-dim:rgba(168,122,22,.14);
}
html[data-theme=light] body{background-image:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(168,122,22,.06),transparent 60%)}
html[data-theme=light] #tabbar{background:rgba(242,236,223,.94)}
html[data-theme=light] .save-btn,html[data-theme=light] .cal-d.sel{color:#FFFDF6}
/* ===== v1.1: button styles ===== */
.obj-btn.filled .tint{opacity:.9}
.obj-btn.filled .ic{color:#241D12!important}
.obj-btn.filled .nm{color:#241D12}
.obj-btn.filled .badge{background:rgba(20,16,10,.45);border-color:transparent;color:#FFF3D6}
.obj-btn.outline{background:none;border-width:1.5px}
.obj-btn.outline .tint{display:none}
/* ===== v1.1: text scale ===== */
:root{--ts:1}
body{font-size:calc(15px*var(--ts))}
.obj-btn .nm{font-size:calc(11.5px*var(--ts))}
.tl-body .t1{font-size:calc(14px*var(--ts))}
.tl-body .t2{font-size:calc(12.5px*var(--ts))}
.fld label{font-size:calc(11px*var(--ts))}
.fld input[type=time],.fld input[type=number],.fld input[type=text],.fld input[type=date],.fld textarea,.fld select{font-size:calc(15px*var(--ts))}
.rowbtn .rl b{font-size:calc(14.5px*var(--ts))}
.rowbtn .rl span{font-size:calc(12px*var(--ts))}
.xc-card p{font-size:calc(12.5px*var(--ts))}
.chip{font-size:calc(12.5px*var(--ts))}
/* ===== v1.1: bottom anchoring / safe area ===== */
.canvas-wrap{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
/* ===== v1.3: app accent on native controls (no system blue) ===== */
input,select,textarea,progress{accent-color:var(--gold);caret-color:var(--gold)}
::selection{background:var(--gold);color:#221B0C}
select option{background:var(--surface2);color:var(--text)}
select option:checked{background:var(--gold);color:#221B0C}
label.slr{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted)}
.slr input{flex:1}
.slr span{font-family:var(--font-m);font-size:10.5px;width:42px;text-align:right;color:var(--text)}
/* ===== v1.3: segmented control ===== */
.seg{display:flex;gap:6px}
.seg button{padding:8px 15px;border-radius:999px;border:1px solid var(--line2);background:var(--surface2);
  color:var(--muted);font-family:var(--font-b);font-weight:600;font-size:12px;cursor:pointer;transition:all .2s}
.seg button.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
/* ===== v1.3: timeline connector segments, icon-centred ===== */
.tl-item::after{content:'';position:absolute;left:75px;top:46px;bottom:-11px;width:2px;
  background:var(--line);border-radius:2px}
.tl-item:last-child::after{display:none}
/* ===== v1.3: manual ===== */
.man h3{font-family:var(--font-d);font-weight:560;font-size:16.5px;margin:20px 2px 7px;color:var(--gold)}
.man h3:first-child{margin-top:6px}
.man p{color:var(--muted);font-size:13.5px;line-height:1.68;margin:0 2px}
</style>
</head>

function normalizeConfig(){ // migration 1.0 -> 1.1
 if(Config.app.theme!=='light')Config.app.theme='dark';
 if(!Config.settings.textScale)Config.settings.textScale=100;
 Config.canvases.forEach(c=>{if(c.gap==null)c.gap=12});

 rt.dataset.theme=Config.app.theme==='light'?'light':'dark';
 rt.style.setProperty('--ts',String((Config.settings.textScale||100)/100));
 const acc=Config.app.accent;
 if(acc&&acc.toLowerCase()!=='#e3b341'){
  rt.style.setProperty('--gold',acc);
  const r=parseInt(acc.slice(1,3),16),g=parseInt(acc.slice(3,5),16),b=parseInt(acc.slice(5,7),16);
  rt.style.setProperty('--gold-dim',`rgba(${r},${g},${b},.15)`)}

/* config helpers */
function findObj(id){return Config.objects.find(o=>o.id===id)}
function findAlias(obj,aliasId){ // recursive search, returns {alias, chain[]}
 function walk(node,chain){for(const a of (node.aliases||[])){
   if(a.id===aliasId)return{alias:a,chain:[...chain,a]};
   const r=walk(a,[...chain,a]);if(r)return r}return null}
 return walk(obj,[])}
function entityFor(objectId,aliasId){const o=findObj(objectId);if(!o)return null;
 if(!aliasId)return{obj:o,node:o,chain:[]};
 const f=findAlias(o,aliasId);return f?{obj:o,node:f.alias,chain:f.chain}:null}
function canvasFor(ownerId){return Config.canvases.find(c=>c.scope==='alias'&&c.ownerId===ownerId)}
function tagById(id){return Config.tags.find(x=>x.id===id)}
function catById(id){return Config.tagCategories.find(x=>x.id===id)}
function listById(id){return Config.lists.find(x=>x.id===id)}

/* ================= state: Timeline (Layer B, IndexedDB) ================= */
let DB=null;
function idbOpen(){return new Promise((res,rej)=>{
 const rq=indexedDB.open('origin-db',1);
 rq.onupgradeneeded=e=>{const db=e.target.result;
  if(!db.objectStoreNames.contains('records')){
   const st=db.createObjectStore('records',{keyPath:'id'});
   st.createIndex('date','date',{unique:false})}};
 rq.onsuccess=e=>{DB=e.target.result;res()};
 rq.onerror=e=>rej(e)})}
function idbPut(rec){return new Promise((res,rej)=>{
 const tx=DB.transaction('records','readwrite');tx.objectStore('records').put(rec);
 tx.oncomplete=res;tx.onerror=rej})}
function idbDel(id){return new Promise((res,rej)=>{
 const tx=DB.transaction('records','readwrite');tx.objectStore('records').delete(id);
 tx.oncomplete=res;tx.onerror=rej})}
function idbByDate(date){return new Promise((res,rej)=>{
 const tx=DB.transaction('records','readonly');
 const rq=tx.objectStore('records').index('date').getAll(IDBKeyRange.only(date));
 rq.onsuccess=()=>res(rq.result||[]);rq.onerror=rej})}
function idbAll(){return new Promise((res,rej)=>{
 const tx=DB.transaction('records','readonly');const rq=tx.objectStore('records').getAll();
 rq.onsuccess=()=>res(rq.result||[]);rq.onerror=rej})}
function idbRange(from,to){return new Promise((res,rej)=>{ // date strings inclusive
 const tx=DB.transaction('records','readonly');
 const rq=tx.objectStore('records').index('date').getAll(IDBKeyRange.bound(from,to));
 rq.onsuccess=()=>res(rq.result||[]);rq.onerror=rej})}

/* month cache for calendar markers: {'YYYY-MM': {day: {has, busy}}} */
async function monthMarkers(y,m){ // m 0-based
 const from=`${y}-${pad(m+1)}-01`,to=`${y}-${pad(m+1)}-31`;
 const recs=await idbRange(from,to);const mk={};
 for(const r of recs){const d=+r.date.slice(8,10);mk[d]=mk[d]||{has:false,busy:false};
  if(r.type==='day_status'){if(r.values&&r.values.busy)mk[d].busy=true}
  else mk[d].has=true}
 return mk}

/* ===== menstrual cycle engine (v1.5) ===== */
function cycleInfo(){const c=Config.cycle;
 if(!c||!c.enabled||!c.starts||!c.starts.length)return null;
 const starts=[...c.starts].sort();
 let len=Math.max(15,Math.min(60,c.cycleLen||28));
 if(starts.length>=2){const ints=[];
  for(let i=1;i<starts.length;i++){
   const d=Math.round((new Date(starts[i]+'T12:00:00')-new Date(starts[i-1]+'T12:00:00'))/86400000);
   if(d>=15&&d<=60)ints.push(d)}
  if(ints.length)len=Math.round(ints.reduce((a,b)=>a+b,0)/ints.length)}
 return {anchor:starts[starts.length-1],allStarts:starts,len,plen:Math.max(1,Math.min(10,c.periodLen||5))}}
function cycleMarkers(y,m){ // {day:{period,ov}} for a month; predictions up to ~5 months ahead
 const info=cycleInfo();if(!info)return {};
 const res={};
 const mark=(d,key)=>{if(d.getFullYear()===y&&d.getMonth()===m){
  const dd=d.getDate();res[dd]=res[dd]||{};res[dd][key]=true}};
 /* recorded periods (history + anchor) */
 for(const s of info.allStarts){const sd=new Date(s+'T12:00:00');
  for(let i=0;i<info.plen;i++){const d=new Date(sd);d.setDate(d.getDate()+i);mark(d,'period')}}
 /* predictions from the last recorded start */
 const anchor=new Date(info.anchor+'T12:00:00');
 const horizon=new Date(anchor);horizon.setDate(horizon.getDate()+160); // ~5 months
 let s=new Date(anchor);
 for(let k=0;k<8;k++){
  const ov=new Date(s);ov.setDate(ov.getDate()+info.len-14); // ovulation of this cycle
  for(const off of [-1,0,1]){const d=new Date(ov);d.setDate(d.getDate()+off);
   if(d<=horizon)mark(d,'ov')}
  s=new Date(s);s.setDate(s.getDate()+info.len); // next predicted start
  if(s>horizon)break;
  for(let i=0;i<info.plen;i++){const d=new Date(s);d.setDate(d.getDate()+i);mark(d,'period')}}
 return res}

function objButton(node,parentObj,todays){
 // node = object or alias; parentObj = root object when node is alias
 const rootObj=parentObj||node;
 const isAlias=!!parentObj;
 const hasAliases=(node.aliases||[]).length>0;
 const hasCounter=(node.properties||[]).some(p=>p.type==='counter');
 const bstyle=node.style||rootObj.style||'soft';
 const b=document.createElement('button');b.className='obj-btn '+bstyle;
 if(bstyle==='outline')b.style.borderColor=colorVar(node.color);
 const cnt=todays?todays.filter(r=>r.type==='activation'&&r.objectId===rootObj.id&&
   (isAlias?r.aliasId===node.id:!hasAliases?true:false)&&(hasCounter?true:true)).length:0;
 b.innerHTML=`<div class="tint" style="background:${colorVar(node.color)}"></div>
  <div class="ic" style="color:${colorVar(node.color)}">${icon(node.icon)}</div>
  <div class="nm">${esc(node.name)}</div>
  ${hasCounter&&cnt?`<div class="badge">${cnt}</div>`:''}`;
 let pressTimer=null,longFired=false;
 const openCard=()=>pushView(viewCard(rootObj.id,isAlias?node.id:null,todayStr()));
 const openAliasGrid=()=>pushView(viewAliasGrid(rootObj,node));
 b.addEventListener('pointerdown',()=>{longFired=false;
  if(hasCounter){pressTimer=setTimeout(()=>{longFired=true;openCard()},550)}});
 b.addEventListener('pointerup',()=>clearTimeout(pressTimer));
 b.addEventListener('pointerleave',()=>clearTimeout(pressTimer));
 b.addEventListener('click',async()=>{
  if(longFired)return;
  if(hasAliases){openAliasGrid();return}
  if(hasCounter){ // instant record, §5 p.15
   b.classList.remove('pulse');void b.offsetWidth;b.classList.add('pulse');
   await saveRecord(newActivation(rootObj.id,isAlias?node.id:null,todayStr(),{counter:1}));
   const bd=b.querySelector('.badge');
   if(bd)bd.textContent=+bd.textContent+1;
   else b.insertAdjacentHTML('beforeend','<div class="badge">1</div>');
   return}
  openCard()});
 return b}
function viewAliasGrid(rootObj,node){
 return{title:node.name,sub:t('aliases'),render:async el=>{
  const cv=canvasFor(node.id)||{columns:Math.min(3,(node.aliases||[]).length||1),cells:(node.aliases||[]).map(a=>a.id)};
  const chain=node===rootObj?[]:[node];
  el.innerHTML=`<div class="crumb"><b>${esc(rootObj.name)}</b>${chain.map(c=>' → '+esc(c.name)).join('')}</div>
   <div class="canvas-wrap"><div class="obj-grid" id="alGrid"></div></div>`;

  grid.style.justifyContent=cv.cellW?'center':'stretch';
  grid.style.gap=(cv.gap!=null?cv.gap:12)+'px';
  const todays=await idbByDate(todayStr());
  const cells=(cv.cells&&cv.cells.length?cv.cells:(node.aliases||[]).map(a=>a.id))
   .filter(id=>id&&findAlias(rootObj,id));
  cells.forEach(id=>{const f=findAlias(rootObj,id);
   const b=objButton(f.alias,rootObj,todays);
   if(cv.cellH){b.style.aspectRatio='auto';b.style.height=cv.cellH+'px'}

 }}}

const PROP_ORDER=['start','end','minutes','hours','stars','measure','note_text','note_voice','list_select','tags','counter'];
function viewCard(objectId,aliasId,date,existing){
 const ent=entityFor(objectId,aliasId);
 return{title:t('rec_edit'),sub:dayLabel(date),render:async el=>{
  if(!ent){el.innerHTML='<div class="canvas-hint">?</div>';return}
  const node=ent.node,obj=ent.obj;
  const props=(node.properties||[]).filter(p=>p.type!=='aliases');
  const sorted=[...props].sort((a,b)=>PROP_ORDER.indexOf(a.type)-PROP_ORDER.indexOf(b.type));
  const vals=existing?JSON.parse(JSON.stringify(existing.values||{})):{};
  const chain=ent.chain.map(c=>c.name);
  el.innerHTML=`<div class="card-head">
    <div class="ic" style="background:${colorVar(node.color)}22;color:${colorVar(node.color)};border:1px solid ${colorVar(node.color)}44">${icon(node.icon)}</div>
    <div><h2>${esc(node.name)}</h2>
     ${chain.length?`<div class="chain">${esc(obj.name)} → ${chain.map(esc).join(' → ')}</div>`:''}</div>
   </div><div id="flds"></div>`;
  const F=el.querySelector('#flds');let delay=0;
  const addFld=html=>{const d=document.createElement('div');d.className='fld';
   d.style.animationDelay=(delay+=45)+'ms';d.innerHTML=html;F.appendChild(d);return d};
  const today=await idbByDate(date);

  for(const p of sorted){switch(p.type){
   case 'start':{
    if(!existing&&vals.start==null)vals.start=hm();
    const f=addFld(`<label>${t('start')}</label><div class="row">
     <input type="time" data-k="start" value="${esc((vals.start||'').slice(11,16)||vals.start||hm())}">
     <button class="mini-btn" data-now="start">${t('now')}</button></div>`);
    f.querySelector('[data-now]').onclick=()=>f.querySelector('input').value=hm();break}
   case 'end':{
    const f=addFld(`<label>${t('end')}</label><div class="row">
     <input type="time" data-k="end" value="${esc((vals.end||'').slice(11,16)||vals.end||'')}">
     <button class="mini-btn" data-now="end">${t('now')}</button></div>`);
    f.querySelector('[data-now]').onclick=()=>f.querySelector('input').value=hm();break}
   case 'minutes':{
    if(!existing&&vals.minutes==null&&p.defaultLimit!=null)vals.minutes=p.defaultLimit;
    addFld(`<label>${t('minutes')}</label>
     <input type="number" inputmode="numeric" data-k="minutes" value="${vals.minutes!=null?vals.minutes:''}" placeholder="${p.defaultLimit||''}">`);break}
   case 'hours':{
    if(!existing&&vals.hours==null&&p.defaultLimit!=null)vals.hours=p.defaultLimit;
    addFld(`<label>${t('hours')}</label>
     <input type="number" inputmode="decimal" step="0.5" data-k="hours" value="${vals.hours!=null?vals.hours:''}" placeholder="${p.defaultLimit||''}">`);break}
   case 'stars':{
    const f=addFld(`<label>${t('stars')}</label><div class="stars" data-k="stars"></div>`);
    const box=f.querySelector('.stars');
    const paint=()=>{box.innerHTML='';for(let i=1;i<=5;i++){
     const s=document.createElement('div');s.className='st'+((vals.stars||0)>=i?' on':'');
     s.innerHTML=(vals.stars||0)>=i?UI_IC.starFill:UI_IC.starLine;
     s.onclick=()=>{vals.stars=(vals.stars===i?null:i);paint()};box.appendChild(s)}};
    paint();break}
   case 'measure':{
    addFld(`<label>${t('measure')}</label><div class="row">
     <input type="number" inputmode="decimal" step="0.1" data-k="measure" value="${vals.measure!=null?vals.measure:''}">
     <span class="unit-lab">${esc(p.unit||'')}</span></div>`);break}
   case 'note_text':{
    addFld(`<label>${t('note_text')}</label><textarea data-k="note_text">${esc(vals.note_text||'')}</textarea>`);break}
   case 'note_voice':{
    const f=addFld(`<label>${t('note_voice')}</label><div class="row" style="align-items:flex-start">
     <textarea data-k="note_voice" style="flex:1">${esc(vals.note_voice||'')}</textarea>
     <button class="mini-btn gold" data-mic style="padding:11px 12px">${icon('mic',16)}</button></div>`);
    const micBtn=f.querySelector('[data-mic]'),ta=f.querySelector('textarea');
    let recog=null;
    micBtn.onclick=()=>{
     const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
     if(!SR){toast(t('voice_unsupported'));return}
     if(recog){recog.stop();return}
     recog=new SR();
     recog.lang={ru:'ru-RU',it:'it-IT',en:'en-US',ua:'uk-UA'}[Config.app.locale]||'ru-RU';
     recog.interimResults=false;recog.continuous=true;
     micBtn.classList.add('rec');micBtn.textContent=t('voice_stop');toast(t('voice_talk'));
     recog.onresult=e=>{let s='';for(const r of e.results)if(r.isFinal)s+=r[0].transcript+' ';
      if(s)ta.value=(ta.value?ta.value+' ':'')+s.trim()};
     recog.onend=()=>{micBtn.classList.remove('rec');micBtn.innerHTML=icon('mic',16);recog=null};
     recog.onerror=()=>{recog&&recog.stop()};
     recog.start()};break}
   case 'list_select':{
    const list=listById(p.listId);if(!list)break;
    const f=addFld(`<label>${esc(list.name)}</label><div class="chips" data-k="list_select"></div>`);
    const box=f.querySelector('.chips');
    if(!Array.isArray(vals.list_select))vals.list_select=vals.list_select?[vals.list_select]:[];
    const paint=()=>{box.innerHTML='';
     for(const it of list.items){const on=vals.list_select.includes(it.id);
      const c=document.createElement('div');c.className='chip'+(on?' on':'');
      c.textContent=it.name;
      c.onclick=()=>{if(on)vals.list_select=vals.list_select.filter(x=>x!==it.id);
       else{if(p.mode!=='multiple')vals.list_select=[];vals.list_select.push(it.id)}paint()};
      box.appendChild(c)}
     const add=document.createElement('div');add.className='chip add';add.innerHTML=UI_IC.plus+' '+t('add');
     add.onclick=()=>quickAddListItem(list,()=>{saveConfig();paint()});
     box.appendChild(add)};
    paint();break}
   case 'tags':{
    const allowed=p.allowedCategoryIds&&p.allowedCategoryIds.length?
     Config.tagCategories.filter(c=>p.allowedCategoryIds.includes(c.id)):Config.tagCategories;
    const f=addFld(`<label>${t('tags')}</label><div data-k="tags" id="tagbox"></div>`);
    const box=f.querySelector('#tagbox');
    if(!Array.isArray(vals.tags))vals.tags=vals.tags?[vals.tags]:[];
    const paint=()=>{box.innerHTML='';
     for(const cat of allowed){
      const tags=Config.tags.filter(tg=>tg.categoryId===cat.id);
      const blk=document.createElement('div');blk.className='tag-cat-block';
      blk.innerHTML=`<div class="cat-name">${esc(cat.name)}</div><div class="chips"></div>`;
      const ch=blk.querySelector('.chips');
      for(const tg of tags){const on=vals.tags.includes(tg.id);
       const c=document.createElement('div');c.className='chip'+(on?' on':'');
       c.style.setProperty('--tagc',colorVar(tg.color));
       c.innerHTML=`<span class="dot" style="background:${colorVar(tg.color)}"></span>${esc(tg.name)}`;
       c.onclick=()=>{if(on)vals.tags=vals.tags.filter(x=>x!==tg.id);
        else{if(p.mode!=='multiple')vals.tags=[];vals.tags.push(tg.id)}paint()};
       ch.appendChild(c)}
      const add=document.createElement('div');add.className='chip add';add.innerHTML=UI_IC.plus;
      add.onclick=()=>quickAddTag(cat,()=>{saveConfig();paint()});
      ch.appendChild(add);box.appendChild(blk)}};
    paint();break}
   case 'counter':{
    const n=today.filter(r=>r.type==='activation'&&r.objectId===objectId&&r.aliasId===(aliasId||null)).length;
    const f=addFld(`<label>${t('counter')}</label><div class="counter-big">
     <div class="num">${n}</div><div class="lab">${t('today_count')}</div>
     <button class="mini-btn gold" data-cplus style="margin-left:auto;padding:12px 22px;font-size:15px">${t('tap_plus')}</button></div>`);
    f.querySelector('[data-cplus]').onclick=async ev=>{
     await saveRecord(newActivation(objectId,aliasId,date,{counter:1}));
     f.querySelector('.num').textContent=+f.querySelector('.num').textContent+1;
     ev.target.classList.remove('pulse');void ev.target.offsetWidth;ev.target.classList.add('pulse')};
    break}
  }}
  /* save */
  const sb=document.createElement('button');sb.className='save-btn';sb.textContent=t('save');
  F.appendChild(sb);
  sb.onclick=async()=>{
   const read=k=>{const i=el.querySelector(`[data-k="${k}"]`);return i?i.value.trim():null};
   const out={};
   for(const p of sorted){switch(p.type){
    case 'start':{const v=read('start');if(v)out.start=`${date}T${v}:00`;break}
    case 'end':{const v=read('end');if(v)out.end=`${date}T${v}:00`;break}
    case 'minutes':{const v=read('minutes');if(v!=='')out.minutes=+v;break}
    case 'hours':{const v=read('hours');if(v!=='')out.hours=+v;break}
    case 'stars':if(vals.stars)out.stars=vals.stars;break;
    case 'measure':{const v=read('measure');if(v!=='')out.measure=+v;if(p.unit)out.measureUnit=p.unit;break}
    case 'note_text':{const v=read('note_text');if(v)out.note_text=v;break}
    case 'note_voice':{const v=read('note_voice');if(v)out.note_voice=v;break}
    case 'list_select':if(vals.list_select&&vals.list_select.length)out.list_select=vals.list_select;break;
    case 'tags':if(vals.tags&&vals.tags.length)out.tags=vals.tags;break;
   }}
   if(existing){existing.values=out;await updateRecord(existing)}
   else{const r=newActivation(objectId,aliasId,date,out);
    if(existing&&existing.plannedRef)r.plannedRef=existing.plannedRef;
    await saveRecord(r)}
   toast(t('saved'));popView()};
  if(existing){
   const db=document.createElement('button');db.className='del-link';db.textContent=t('del');
   db.onclick=()=>confirmDlg(t('confirm_del'),async()=>{await idbDel(existing.id);toast(t('deleted'));popView()});
   F.appendChild(db)}

/* ---- 3D calendar drum ---- */
function renderDrum(el){
 const st=todayState;const drum=el.querySelector('#drum');if(!drum)return;
 drum.innerHTML='';
 if(st.calMode==='months'||st.calMode==='years'){renderPicker(drum,el)}
 else{
  const base=st.calBase;
  const months=[-2,-1,0,1,2].map(off=>new Date(base.getFullYear(),base.getMonth()+off,1));
  const posCls=['pos-farl','pos-l','pos-c','pos-r','pos-farr'];
  months.forEach(async(m,i)=>{
   const div=document.createElement('div');div.className='cal-month '+posCls[i];
   div.dataset.off=i-2;
   await buildMonth(div,m,el);
   drum.appendChild(div)});
 }
 /* swipe */
 let sx=null,dx=0;
 drum.onpointerdown=e=>{sx=e.clientX;dx=0};
 drum.onpointermove=e=>{if(sx==null)return;dx=e.clientX-sx};
 const finish=()=>{if(sx==null)return;
  if(Math.abs(dx)>50){const dir=dx<0?1:-1;
   if(st.calMode==='months'){st.calBase=new Date(st.calBase.getFullYear()+dir,st.calBase.getMonth(),1);renderDrum(el)}
   else if(st.calMode==='years'){st.calBase=new Date(st.calBase.getFullYear()+dir*12,st.calBase.getMonth(),1);renderDrum(el)}
   else shiftDrum(el,dir)}
  sx=null;dx=0};
 drum.onpointerup=finish;drum.onpointerleave=finish;
}
/* month / year picker — classic drill-up (v1.2) */
function renderPicker(drum,el){
 const st=todayState;const now=new Date();
 const div=document.createElement('div');div.className='cal-month pos-c';
 if(st.calMode==='months'){
  const y=st.calBase.getFullYear();
  const L={ru:'ru-RU',it:'it-IT',en:'en-US',ua:'uk-UA'}[Config.app.locale]||'en-US';
  let html=`<h4 data-hd>${y} <span style="opacity:.5;font-size:11px">▾</span></h4><div class="pick-grid">`;
  for(let m=0;m<12;m++){
   const nm=new Date(2000,m,1).toLocaleDateString(L,{month:'short'});
   const cur=(y===now.getFullYear()&&m===now.getMonth());
   html+=`<button class="pk${cur?' now':''}" data-m="${m}">${nm}</button>`}
  html+='</div>';div.innerHTML=html;
  div.querySelector('[data-hd]').onclick=()=>{st.calMode='years';renderDrum(el)};
  div.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{
   st.calBase=new Date(y,+b.dataset.m,1);st.calMode='days';renderDrum(el)});
 }else{
  const y0=st.calBase.getFullYear()-5;
  let html=`<h4>${y0} – ${y0+11}</h4><div class="pick-grid">`;
  for(let i=0;i<12;i++){const yr=y0+i;
   html+=`<button class="pk${yr===now.getFullYear()?' now':''}" data-y="${yr}">${yr}</button>`}
  html+='</div>';div.innerHTML=html;
  div.querySelectorAll('[data-y]').forEach(b=>b.onclick=()=>{
   st.calBase=new Date(+b.dataset.y,st.calBase.getMonth(),1);st.calMode='months';renderDrum(el)});
 }
 drum.appendChild(div)}
function shiftDrum(el,dir){ // dir 1 = next month
 const st=todayState;const drum=el.querySelector('#drum');
 const order=['pos-farl','pos-l','pos-c','pos-r','pos-farr'];
 drum.querySelectorAll('.cal-month').forEach(m=>{
  const idx=order.findIndex(c=>m.classList.contains(c));
  const ni=idx-dir;
  m.classList.remove(order[idx]);
  m.classList.add(order[Math.max(0,Math.min(4,ni))]);
  if(ni<0||ni>4)m.style.opacity=0});
 st.calBase=new Date(st.calBase.getFullYear(),st.calBase.getMonth()+dir,1);
 setTimeout(()=>renderDrum(el),510)}
async function buildMonth(div,m,rootEl){
 const st=todayState;
 const y=m.getFullYear(),mo=m.getMonth();
 const mk=await monthMarkers(y,mo);
 const cm=cycleMarkers(y,mo);
 const first=new Date(y,mo,1);
 let startDow=(first.getDay()+6)%7; // Monday first
 const dim=new Date(y,mo+1,0).getDate();
 const wd={ru:['пн','вт','ср','чт','пт','сб','вс'],ua:['пн','вт','ср','чт','пт','сб','нд'],
  it:['lu','ma','me','gi','ve','sa','do'],en:['mo','tu','we','th','fr','sa','su']}[Config.app.locale]||['пн','вт','ср','чт','пт','сб','вс'];
 let html=`<h4>${monthName(m)} <span style="opacity:.5;font-size:11px">▾</span></h4><div class="cal-week">${wd.map(w=>`<span>${w}</span>`).join('')}</div><div class="cal-days">`;
 for(let i=0;i<startDow;i++)html+='<div class="cal-d dim"></div>';
 const tds=todayStr();
 for(let d=1;d<=dim;d++){
  const ds=`${y}-${pad(mo+1)}-${pad(d)}`;
  const cls=['cal-d'];if(ds===tds)cls.push('today');if(ds===st.date)cls.push('sel');
  const km=mk[d];
  const kc=cm[d];
  html+=`<div class="${cls.join(' ')}" data-d="${ds}">${d}
   ${kc?`<span class="mkt">${kc.period?'<i class="p"></i>':''}${kc.ov?'<i class="o"></i>':''}</span>`:''}
   ${km?`<span class="mk">${km.has?'<i></i>':''}${km.busy?'<i class="busy"></i>':''}</span>`:''}</div>`}
 html+='</div>';
 div.innerHTML=html;
 div.querySelector('h4').onclick=()=>{st.calMode='months';st.calBase=new Date(y,mo,1);renderDrum(rootEl)};
 div.querySelectorAll('[data-d]').forEach(c=>c.onclick=()=>{
  todayState.date=c.dataset.d;setChrome();renderDay(rootEl);
  rootEl.querySelectorAll('.cal-d.sel').forEach(x=>x.classList.remove('sel'));
  c.classList.add('sel')})}

/* ---- planning sheet (planned records + recurrence) ---- */
function planSheet(date,after){
 pickObjectSheet((objId,aliasId)=>{
  const ent=entityFor(objId,aliasId);
  openSheet((sh,close)=>{
   sh.insertAdjacentHTML('beforeend',`<h3>${t('plan_task')}: ${esc(ent.node.name)}</h3>
    <div class="fld"><label>${t('start')}</label><input type="date" id="pl_date" value="${date}"></div>
    <div class="fld"><label>${t('start')} (hh:mm)</label><input type="time" id="pl_time"></div>
    <div class="fld"><label>${t('repeat')}</label>
     <div class="wk-row" id="pl_wk"></div>
     <div class="row" style="margin-top:10px"><label style="font-size:11.5px;color:var(--muted)">${t('until')}</label>
      <input type="date" id="pl_until" style="flex:1;background:var(--surface3);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 10px"></div>
    </div>
    <button class="save-btn" id="pl_ok">${t('save')}</button>`);
   const WD=['MO','TU','WE','TH','FR','SA','SU'];
   const wdLab={ru:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],ua:['Пн','Вт','Ср','Чт','Пт','Сб','Нд'],
    it:['Lu','Ma','Me','Gi','Ve','Sa','Do'],en:['Mo','Tu','We','Th','Fr','Sa','Su']}[Config.app.locale]||['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
   const sel=new Set();
   const wkRow=sh.querySelector('#pl_wk');
   WD.forEach((w,i)=>{const b=document.createElement('div');b.className='wk';b.textContent=wdLab[i];
    b.onclick=()=>{sel.has(w)?sel.delete(w):sel.add(w);b.classList.toggle('on')};wkRow.appendChild(b)});
   sh.querySelector('#pl_ok').onclick=async()=>{
    const d0=sh.querySelector('#pl_date').value||date;
    const tm=sh.querySelector('#pl_time').value||null;
    const until=sh.querySelector('#pl_until').value||null;
    const baseVals={};if(tm)baseVals.time=tm;
    const defs=(ent.node.properties||[]).find(p=>p.type==='minutes');
    if(defs&&defs.defaultLimit!=null)baseVals.minutes=defs.defaultLimit;
    if(sel.size&&until){ // recurrence: materialize planned records (spec §7)
     const group=uuid('rrule');
     let cur=new Date(d0+'T12:00:00');const end=new Date(until+'T12:00:00');
     let n=0;
     while(cur<=end&&n<200){
      const dow=WD[(cur.getDay()+6)%7];
      if(sel.has(dow)){
       await saveRecord({id:uuid('rec'),type:'planned',date:dateStr(cur),objectId:objId,
        aliasId:aliasId||null,createdAt:isoNow(),
        recurrence:{days:[...sel],until,group},values:Object.assign({},baseVals)});n++}
      cur.setDate(cur.getDate()+1)}
    }else{
     await saveRecord({id:uuid('rec'),type:'planned',date:d0,objectId:objId,
      aliasId:aliasId||null,createdAt:isoNow(),values:baseVals})}
    close();toast(t('saved'));after&&after()}});
 })}

function viewCycle(){return{title:t('cycle'),render:el=>{
 if(!Config.cycle)Config.cycle={enabled:false,cycleLen:28,periodLen:5,starts:[]};
 const c=Config.cycle;
 const paint=()=>{el.innerHTML='';
  const en=document.createElement('div');en.className='rowbtn';en.style.cursor='default';
  en.innerHTML=`<div class="rl"><b>${t('cycle_s')}</b></div>
   <label class="switch"><input type="checkbox" ${c.enabled?'checked':''}><i></i></label>`;
  en.querySelector('input').onchange=e=>{c.enabled=e.target.checked;saveConfig();paint()};
  el.appendChild(en);
  if(!c.enabled)return;
  const info=cycleInfo();
  const lg=document.createElement('div');lg.className='notice';
  lg.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#E37FB4;margin-right:5px"></span>${t('cyc_period')}
   &nbsp;·&nbsp; <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#5FB8E8;margin-right:5px"></span>${t('cyc_ov')}
   ${info?`&nbsp;·&nbsp; Ø ${info.len}d`:''}`;
  el.appendChild(lg);
  const f1=document.createElement('div');f1.className='fld';
  const anchor=c.starts.length?[...c.starts].sort()[c.starts.length-1]:'';
  f1.innerHTML=`<label>${t('last_start')}</label><input type="date" id="cy_last" value="${anchor}">`;
  f1.querySelector('#cy_last').onchange=e=>{const v=e.target.value;if(!v)return;
   const s=[...c.starts].sort();
   if(!s.length)c.starts=[v];
   else{s[s.length-1]=v;c.starts=[...new Set(s)]}
   saveConfig();paint()};
  el.appendChild(f1);
  const f2=document.createElement('div');f2.className='fld';
  f2.innerHTML=`<label>${t('cycle_len')}</label><input type="number" min="15" max="60" id="cy_len" value="${c.cycleLen||28}">`;
  f2.querySelector('#cy_len').onchange=e=>{c.cycleLen=Math.max(15,Math.min(60,+e.target.value||28));saveConfig();paint()};
  el.appendChild(f2);
  const f3=document.createElement('div');f3.className='fld';
  f3.innerHTML=`<label>${t('period_len')}</label><input type="number" min="1" max="10" id="cy_pl" value="${c.periodLen||5}">`;
  f3.querySelector('#cy_pl').onchange=e=>{c.periodLen=Math.max(1,Math.min(10,+e.target.value||5));saveConfig();paint()};
  el.appendChild(f3);
  /* correction: record real period start */
  const f4=document.createElement('div');f4.className='fld';
  f4.innerHTML=`<label>${t('mark_start')}</label><div class="row">
   <input type="date" id="cy_new" value="${todayStr()}">
   <button class="mini-btn gold" id="cy_add">${t('add')}</button></div>`;
  f4.querySelector('#cy_add').onclick=()=>{const v=f4.querySelector('#cy_new').value;if(!v)return;
   if(!c.starts.includes(v))c.starts.push(v);
   saveConfig();toast(t('saved'));paint()};
  el.appendChild(f4);
  /* history */
  if(c.starts.length){
   const f5=document.createElement('div');f5.className='fld';
   f5.innerHTML=`<label>${t('starts_hist')}</label><div id="cy_hist"></div>`;
   const hb=f5.querySelector('#cy_hist');
   [...c.starts].sort().reverse().forEach(s=>{
    const row=document.createElement('div');row.className='tagline';
    row.innerHTML=`<span class="dot" style="background:#E37FB4"></span><b>${dayLabel(s)} ${s.slice(0,4)}</b>
     <button class="x">${UI_IC.x}</button>`;
    row.querySelector('.x').onclick=()=>confirmDlg(t('confirm_del'),()=>{
     c.starts=c.starts.filter(x=>x!==s);saveConfig();paint()});
    hb.appendChild(row)});
   el.appendChild(f5)}
 };
 paint();
}}}
/* ================= Password / app lock (v1.4) ================= */
async function hashStr(s){
 try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('origin:'+s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
 catch(e){let h=5381;for(let i=0;i<s.length;i++)h=(((h<<5)+h)^s.charCodeAt(i))>>>0;return 'djb2:'+h.toString(16)}}
function passwordSheet(after){openSheet((sh,close)=>{
 const has=!!Config.settings.passHash;
 sh.insertAdjacentHTML('beforeend',`<h3>${t('password')}</h3>
  ${has?`<div class="fld"><label>${t('pass_current')}</label><input type="password" id="pw_cur" autocomplete="off"></div>`:''}
  <div class="fld"><label>${t('pass_new')}</label><input type="password" id="pw_new" autocomplete="off"></div>
  <button class="save-btn" id="pw_ok">${t('save')}</button>`);
 sh.querySelector('#pw_ok').onclick=async()=>{
  if(has){const cur=sh.querySelector('#pw_cur').value;
   if(await hashStr(cur)!==Config.settings.passHash){toast(t('pass_wrong'));return}}
  const nv=sh.querySelector('#pw_new').value;
  if(nv)Config.settings.passHash=await hashStr(nv);
  else delete Config.settings.passHash;
  saveConfig();close();toast(t('saved'));after&&after()}})}
function maybeLock(){return new Promise(res=>{
 if(!Config.settings.passHash){res();return}
 const ov=document.createElement('div');
 ov.style.cssText='position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px';
 ov.innerHTML=`<div style="font-family:var(--font-d);font-weight:640;letter-spacing:3.5px;font-size:22px;color:var(--gold)">ORIGIN</div>
  <input type="password" id="lk_in" autocomplete="off" style="width:min(280px,80%);background:var(--surface);border:1px solid var(--line2);border-radius:12px;color:var(--text);font-size:16px;padding:13px 15px;outline:none;text-align:center;font-family:var(--font-m)">
  <button class="mini-btn gold" id="lk_ok" style="padding:12px 34px;font-size:14px">${t('unlock')}</button>`;
 document.body.appendChild(ov);
 const inp=ov.querySelector('#lk_in');
 const go=async()=>{if(await hashStr(inp.value)===Config.settings.passHash){ov.remove();res()}
  else{toast(t('pass_wrong'));inp.value='';inp.focus()}};
 ov.querySelector('#lk_ok').onclick=go;
 inp.onkeydown=e=>{if(e.key==='Enter')go()};
 setTimeout(()=>inp.focus(),300)})}
/* ================= Manual (v1.3, 4 languages) ================= */
function viewManual(){return{title:t('manual'),render:el=>{
 el.innerHTML=`<div class="man">${MANUAL[Config.app.locale]||MANUAL.en}</div>`}}}
const MANUAL={
en:`<h3>Canvas</h3><p>Your grid of objects. Tap an object to open its card. Objects with aliases open a nested grid. Counter objects record instantly on tap — long-press opens the card.</p>
<h3>Card</h3><p>Fill only what matters: start and end, minutes, stars, measure, notes — typed or dictated with the mic, people from lists, tags by category. Save writes a record to the timeline. Nothing is overwritten: every save is a new record, and edits are logged.</p>
<h3>Today</h3><p>The day's timeline. "Today" returns to the current date. "Calendars" opens the 3D carousel: swipe to move, tap the month name to choose a month, then the year to choose a year. A red mark under a day means it is busy; a dot means it has records.</p>
<h3>Day status</h3><p>Mark the day Free or Busy and add a short day note above the timeline.</p>
<h3>Planning</h3><p>"Plan" creates a future task for an object, optionally repeating on chosen weekdays until a date. When the day comes, tap the plan and Execute: the real activation stays linked to the plan for future plan-vs-fact analysis.</p>
<h3>Exchange</h3><p>Config export transfers your setup to another device. Timeline export feeds the ORIGIN engines — a weekly rhythm is recommended. Full backup contains everything. Cleaning old records is blocked until they have been exported.</p>
<h3>Settings</h3><p>Four managers: Canvas — grids, sizes and spacing; Objects — properties, button styles and aliases; Lists; Tags — categories and colors. Plus language, theme, accent color, text size and past-editing permission.</p>
<h3>Cycle</h3><p>Enable it in Settings → Cycle. Set the first day of the last period, cycle length and period length. ORIGIN predicts about five months ahead: pink dots above calendar dates mark period days, azure dots mark the ovulation window. When a new period starts, record the real date — predictions recalculate, and with history the cycle length adapts automatically.</p><h3>Principle</h3><p>One tap already creates a valuable record; details are optional. Data first — analytics later.</p>`,
it:`<h3>Canvas</h3><p>La tua griglia di oggetti. Tocca un oggetto per aprire la card. Gli oggetti con alias aprono una griglia annidata. Gli oggetti contatore registrano all'istante — la pressione lunga apre la card.</p>
<h3>Card</h3><p>Compila solo ciò che serve: inizio e fine, minuti, stelle, misura, note — scritte o dettate col microfono, persone dalle liste, tag per categoria. Salva scrive un record nella timeline. Nulla viene sovrascritto: ogni salvataggio è un nuovo record, e le modifiche sono registrate.</p>
<h3>Oggi</h3><p>La timeline del giorno. "Oggi" riporta alla data corrente. "Calendari" apre il carosello 3D: swipe per muoverti, tocca il nome del mese per scegliere il mese, poi l'anno per scegliere l'anno. Segno rosso sotto un giorno = giorno occupato; puntino = giorno con record.</p>
<h3>Stato del giorno</h3><p>Segna il giorno come Libero o Occupato e aggiungi una breve nota sopra la timeline.</p>
<h3>Pianificazione</h3><p>"Pianifica" crea un'attività futura per un oggetto, con ripetizione opzionale nei giorni scelti fino a una data. Al momento giusto, tocca il piano ed Esegui: l'attivazione reale resta collegata al piano per l'analisi piano/fatto.</p>
<h3>Scambio</h3><p>L'export configurazione trasferisce il tuo setup su un altro dispositivo. L'export timeline alimenta i motori ORIGIN — consigliato un ritmo settimanale. Il backup completo contiene tutto. La pulizia dei record vecchi è bloccata finché non sono esportati.</p>
<h3>Impostazioni</h3><p>Quattro manager: Canvas — griglie, dimensioni e spaziatura; Oggetti — proprietà, stili dei bottoni e alias; Liste; Tag — categorie e colori. Più lingua, tema, colore accento, dimensione del testo e permesso di modifica del passato.</p>
<h3>Ciclo</h3><p>Attivalo in Impostazioni → Ciclo. Imposta il primo giorno dell’ultimo ciclo, la durata del ciclo e della mestruazione. ORIGIN prevede circa cinque mesi in avanti: punti rosa sopra le date segnano i giorni del ciclo, punti azzurri la finestra di ovulazione. Quando inizia un nuovo ciclo, registra la data reale — le previsioni si ricalcolano e con la cronologia la durata si adatta automaticamente.</p><h3>Principio</h3><p>Un tocco crea già un record di valore; i dettagli sono opzionali. Prima i dati — poi l'analisi.</p>`,
ru:`<h3>Канвас</h3><p>Твоя сетка объектов. Нажатие открывает карточку объекта. Объекты с алиасами открывают вложенную сетку. Объекты-счётчики записывают мгновенно — долгое нажатие открывает карточку.</p>
<h3>Карточка</h3><p>Заполняй только нужное: начало и конец, минуты, звёзды, измерение, ноты — текстом или голосом через микрофон, люди из списков, теги по категориям. Сохранение пишет запись в timeline. Ничего не перезаписывается: каждое сохранение — новая запись, правки логируются.</p>
<h3>Сегодня</h3><p>Лента дня. «Сегодня» возвращает к текущей дате. «Календари» открывает 3D-карусель: свайп листает, нажатие на название месяца открывает выбор месяца, затем года. Красная метка под днём — день занят; точка — есть записи.</p>
<h3>Статус дня</h3><p>Отметь день как Свободен или Занят и добавь короткую заметку дня над лентой.</p>
<h3>Планирование</h3><p>«Запланировать» создаёт задачу на будущее, при необходимости с повторением по дням недели до даты. Когда день наступит, нажми план и «Выполнить»: реальная активация связывается с планом для будущего анализа план/факт.</p>
<h3>Обмен</h3><p>Экспорт конфигурации переносит настройки на другой девайс. Экспорт timeline питает движки ORIGIN — рекомендован недельный ритм. Полный бэкап содержит всё. Очистка старых записей заблокирована, пока они не экспортированы.</p>
<h3>Настройки</h3><p>Четыре менеджера: Canvas — сетки, размеры и отступы; Объекты — свойства, стили кнопок и алиасы; Списки; Теги — категории и цвета. Плюс язык, тема, цвет акцента, размер текста и правки прошлого.</p>
<h3>Цикл</h3><p>Включается в Настройках → Цикл. Укажи первый день последних месячных, длину цикла и длительность месячных. ORIGIN прогнозирует примерно на пять месяцев вперёд: розовые точки над датами — дни месячных, голубые — окно овуляции. Когда начинается новый цикл, запиши реальную дату — прогноз пересчитается, а с историей длина цикла подстраивается автоматически.</p><h3>Цикл</h3><p>Вмикається в Налаштуваннях → Цикл. Вкажи перший день останніх місячних, тривалість циклу та менструації. ORIGIN прогнозує приблизно на пʼять місяців уперед: рожеві крапки над датами — дні менструації, блакитні — вікно овуляції. Коли починається новий цикл, запиши реальну дату — прогноз перерахується, а з історією тривалість підлаштовується автоматично.</p><h3>Принцип</h3><p>Один тап уже создаёт ценную запись; детали опциональны. Сначала данные — потом аналитика.</p>`,
ua:`<h3>Канвас</h3><p>Твоя сітка обʼєктів. Натискання відкриває картку обʼєкта. Обʼєкти з аліасами відкривають вкладену сітку. Обʼєкти-лічильники записують миттєво — довге натискання відкриває картку.</p>
<h3>Картка</h3><p>Заповнюй лише потрібне: початок і кінець, хвилини, зірки, вимір, нотатки — текстом або голосом через мікрофон, люди зі списків, теги за категоріями. Збереження пише запис у timeline. Ніщо не перезаписується: кожне збереження — новий запис, правки логуються.</p>
<h3>Сьогодні</h3><p>Стрічка дня. «Сьогодні» повертає до поточної дати. «Календарі» відкриває 3D-карусель: свайп гортає, натискання на назву місяця відкриває вибір місяця, потім року. Червона мітка під днем — день зайнятий; крапка — є записи.</p>
<h3>Статус дня</h3><p>Познач день як Вільний або Зайнятий і додай коротку нотатку дня над стрічкою.</p>
<h3>Планування</h3><p>«Запланувати» створює задачу на майбутнє, за потреби з повторенням по днях тижня до дати. Коли день настане, натисни план і «Виконати»: реальна активація звʼязується з планом для аналізу план/факт.</p>
<h3>Обмін</h3><p>Експорт конфігурації переносить налаштування на інший девайс. Експорт timeline живить рушії ORIGIN — рекомендовано щотижня. Повний бекап містить усе. Очищення старих записів заблоковане, доки вони не експортовані.</p>
<h3>Налаштування</h3><p>Чотири менеджери: Canvas — сітки, розміри та відступи; Обʼєкти — властивості, стилі кнопок та аліаси; Списки; Теги — категорії та кольори. Плюс мова, тема, колір акценту, розмір тексту та правки минулого.</p>
<h3>Принцип</h3><p>Один тап уже створює цінний запис; деталі опціональні. Спочатку дані — потім аналітика.</p>`};

/* ================= Tag Manager ================= */
function tagInUse(tagId){
 for(const L of Config.lists)for(const it of L.items)if((it.tagIds||[]).includes(tagId))return true;
 return false}
function viewTagMgr(){return{title:t('mgr_tag'),render:el=>{
 el.innerHTML='<div id="cats"></div><div class="inline-edit" style="margin-top:14px"><input id="ncat" placeholder="'+esc(t('cat_name'))+'"><button class="mini-btn gold" id="addCat">'+t('add')+'</button></div>';
 const cats=el.querySelector('#cats');
 for(const cat of Config.tagCategories){
  const blk=document.createElement('div');blk.className='xc-card';
  blk.innerHTML=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
    <span class="dot" style="width:12px;height:12px;border-radius:50%;background:${colorVar(cat.defaultColor)}"></span>
    <h3 style="flex:1;margin:0">${esc(cat.name)}</h3>
    <button class="x mini-btn" data-delcat style="padding:7px 10px">${UI_IC.x.replace('viewBox','width="14" height="14" viewBox')}</button></div>
   <div class="tags"></div>
   <button class="chip add" style="margin-top:9px">${UI_IC.plus} ${t('new_tag').replace('+ ','')}</button>`;
  const tgBox=blk.querySelector('.tags');
  for(const tg of Config.tags.filter(x=>x.categoryId===cat.id)){
   const row=document.createElement('div');row.className='tagline';
   row.innerHTML=`<span class="dot" style="background:${colorVar(tg.color)}"></span><b>${esc(tg.name)}</b>
    <button class="x">${UI_IC.x}</button>`;
   row.querySelector('.dot').onclick=()=>pickColor(tg.color,c=>{tg.color=c;saveConfig();refreshTop()});
   row.querySelector('b').onclick=()=>promptRename(tg.name,n=>{tg.name=n;saveConfig();refreshTop()});
   row.querySelector('.x').onclick=()=>{
    if(tagInUse(tg.id)){toast(t('in_use'));return}
    confirmDlg(t('confirm_del'),()=>{Config.tags=Config.tags.filter(x=>x.id!==tg.id);saveConfig();refreshTop()})};
   tgBox.appendChild(row)}
  blk.querySelector('.chip.add').onclick=()=>quickAddTag(cat,()=>{saveConfig();refreshTop()});
  blk.querySelector('[data-delcat]').onclick=()=>{
   if(Config.tags.some(x=>x.categoryId===cat.id)){toast(t('in_use'));return}
   confirmDlg(t('confirm_del'),()=>{Config.tagCategories=Config.tagCategories.filter(x=>x.id!==cat.id);saveConfig();refreshTop()})};
  cats.appendChild(blk)}
 el.querySelector('#addCat').onclick=()=>{
  const n=el.querySelector('#ncat').value.trim();if(!n)return;
  pickColor('c04',c=>{Config.tagCategories.push({id:uuid('tc'),name:n,defaultColor:c});saveConfig();refreshTop()})};
}}}
function pickColor(cur,cb){openSheet((sh,close)=>{
 sh.insertAdjacentHTML('beforeend',`<h3>${t('color')}</h3><div class="pal" id="pc"></div>`);
 const pal=sh.querySelector('#pc');
 for(let i=1;i<=10;i++){const c='c'+pad(i);const sw=document.createElement('div');
  sw.className='sw'+(c===cur?' on':'');sw.style.background=colorVar(c);
  sw.onclick=()=>{close();cb(c)};pal.appendChild(sw)}})}
function promptRename(cur,cb){openSheet((sh,close)=>{
 sh.insertAdjacentHTML('beforeend',`<h3>${t('edit')}</h3>
  <div class="fld"><input type="text" id="rn" value="${esc(cur)}"></div>
  <button class="save-btn" id="ok">${t('save')}</button>`);
 sh.querySelector('#ok').onclick=()=>{const n=sh.querySelector('#rn').value.trim();if(!n)return;close();cb(n)}})}

 el.querySelector('#addL').onclick=()=>{const n=el.querySelector('#nl').value.trim();if(!n)return;

function editListItem(L,it){openSheet((sh,close)=>{

  <div class="fld"><label>${t('item_name')}</label><input type="text" id="ei_n" value="${esc(it.name)}"></div>

 if(!it.tagIds)it.tagIds=[];
 const box=sh.querySelector('#ei_tags');

  for(const cat of Config.tagCategories){
   const blk=document.createElement('div');blk.className='tag-cat-block';
   blk.innerHTML=`<div class="cat-name">${esc(cat.name)}</div><div class="chips"></div>`;
   const ch=blk.querySelector('.chips');
   for(const tg of Config.tags.filter(x=>x.categoryId===cat.id)){

    const c=document.createElement('div');c.className='chip'+(on?' on':'');

 paint();
 sh.querySelector('#ei_ok').onclick=()=>{const n=sh.querySelector('#ei_n').value.trim();

 {type:'start'},{type:'end'},
 {type:'minutes',params:['defaultLimit']},{type:'hours',params:['defaultLimit']},
 {type:'stars'},{type:'measure',params:['unit']},
