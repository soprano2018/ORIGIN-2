function viewObjectEditor(node,parentObj,depth){
 return{title:node.name||t('new_object'),sub:parentObj?t('alias_of')+' '+parentObj.name:'',render:el=>{
  el.innerHTML='';
  /* name */
  const f1=document.createElement('div');f1.className='fld';
  f1.innerHTML=`<label>${t('obj_name')}</label><input type="text" id="on" value="${esc(node.name)}">`;
  f1.querySelector('input').onchange=e=>{node.name=e.target.value.trim();saveConfig();const tv=viewStack[viewStack.length-1];if(tv)tv.title=node.name||t('new_object');setChrome()};
  el.appendChild(f1);
  /* icon */
  const f2=document.createElement('div');f2.className='fld';
  f2.innerHTML=`<label>${t('icon')}</label><div class="icon-grid"></div>`;
  const ig=f2.querySelector('.icon-grid');
  for(const k of Object.keys(ICONS)){
   const d=document.createElement('div');d.className='ig'+(node.icon===k?' on':'');
   d.innerHTML=icon(k,20);
   d.onclick=()=>{node.icon=k;saveConfig();
    ig.querySelectorAll('.ig').forEach(x=>x.classList.remove('on'));d.classList.add('on')};
   ig.appendChild(d)}
  el.appendChild(f2);
  /* color */
  const f3=document.createElement('div');f3.className='fld';
  f3.innerHTML=`<label>${t('color')}</label><div class="pal"></div>`;
  const pal=f3.querySelector('.pal');
  for(let i=1;i<=10;i++){const c='c'+pad(i);const sw=document.createElement('div');
   sw.className='sw'+(node.color===c?' on':'');sw.style.background=colorVar(c);
   sw.onclick=()=>{node.color=c;saveConfig();
    pal.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));sw.classList.add('on')};
   pal.appendChild(sw)}
  el.appendChild(f3);
  /* button style (v1.1) */
  const f3b=document.createElement('div');f3b.className='fld';
  f3b.innerHTML=`<label>${t('btn_style')}</label><div class="chips" id="stch"></div>`;
  const stBox=f3b.querySelector('#stch');
  const paintSt=()=>{stBox.innerHTML='';
   for(const s of ['soft','filled','outline']){
    const c=document.createElement('div');c.className='chip'+((node.style||'soft')===s?' on':'');
    c.textContent=t('style_'+s);
    c.onclick=()=>{node.style=s;saveConfig();paintSt()};stBox.appendChild(c)}};
  paintSt();el.appendChild(f3b);
  /* properties */
  const f4=document.createElement('div');f4.className='fld';
  f4.innerHTML=`<label>${t('props')}</label><div id="plist"></div>`;
  const pl=f4.querySelector('#plist');
  for(const def of PROP_DEFS){
   const cur=(node.properties||[]).find(p=>p.type===def.type);
   const row=document.createElement('div');row.className='prop-row';
   row.innerHTML=`<div class="pl"><b>${t(def.type)}</b></div>
    <label class="switch"><input type="checkbox" ${cur?'checked':''}><i></i></label>`;
   const paramsBox=document.createElement('div');paramsBox.className='prop-params';
   const renderParams=()=>{
    paramsBox.innerHTML='';const p=(node.properties||[]).find(x=>x.type===def.type);
    if(!p||!def.params)return;
    for(const pr of def.params){
     const r=document.createElement('div');r.className='row';
     if(pr==='defaultLimit'){
      r.innerHTML=`<label>${t('default_v')}</label><input type="number" value="${p.defaultLimit!=null?p.defaultLimit:''}">`;
      r.querySelector('input').onchange=e=>{p.defaultLimit=e.target.value===''?null:+e.target.value;saveConfig()}}
     else if(pr==='unit'){
      r.innerHTML=`<label>${t('unit')}</label><input type="text" value="${esc(p.unit||'')}" placeholder="kg">`;
      r.querySelector('input').onchange=e=>{p.unit=e.target.value.trim();saveConfig()}}
     else if(pr==='mode'){
      r.innerHTML=`<label>${t('mode')}</label><select>
       <option value="single">${t('single')}</option><option value="multiple">${t('multiple')}</option></select>`;
      r.querySelector('select').value=p.mode||'single';
      r.querySelector('select').onchange=e=>{p.mode=e.target.value;saveConfig()}}
     else if(pr==='listId'){
      r.innerHTML=`<label>${t('linked_list')}</label><select>${Config.lists.map(L=>`<option value="${L.id}">${esc(L.name)}</option>`).join('')}</select>`;
      r.querySelector('select').value=p.listId||(Config.lists[0]&&Config.lists[0].id)||'';
      p.listId=r.querySelector('select').value;
      r.querySelector('select').onchange=e=>{p.listId=e.target.value;saveConfig()}}
     else if(pr==='allowedCategoryIds'){
      r.style.flexWrap='wrap';
      r.innerHTML=`<label style="width:100%">${t('allowed_cats')}</label>`;
      const ch=document.createElement('div');ch.className='chips';ch.style.width='100%';
      const paintC=()=>{ch.innerHTML='';
       const allOn=!p.allowedCategoryIds||!p.allowedCategoryIds.length;
       const all=document.createElement('div');all.className='chip'+(allOn?' on':'');
       all.textContent=t('all_cats');
       all.onclick=()=>{p.allowedCategoryIds=[];saveConfig();paintC()};ch.appendChild(all);
       for(const cat of Config.tagCategories){
        const on=(p.allowedCategoryIds||[]).includes(cat.id);
        const c=document.createElement('div');c.className='chip'+(on?' on':'');
        c.innerHTML=`<span class="dot" style="background:${colorVar(cat.defaultColor)}"></span>${esc(cat.name)}`;
        c.onclick=()=>{p.allowedCategoryIds=p.allowedCategoryIds||[];
         on?p.allowedCategoryIds=p.allowedCategoryIds.filter(x=>x!==cat.id):p.allowedCategoryIds.push(cat.id);
         saveConfig();paintC()};
        ch.appendChild(c)}};
      paintC();r.appendChild(ch)}
     paramsBox.appendChild(r)}};
   row.querySelector('input').onchange=e=>{
    node.properties=node.properties||[];
    if(e.target.checked){if(!node.properties.find(x=>x.type===def.type))node.properties.push({type:def.type})}
    else node.properties=node.properties.filter(x=>x.type!==def.type);
    saveConfig();renderParams()};
   pl.appendChild(row);pl.appendChild(paramsBox);renderParams()}
  el.appendChild(f4);
  /* aliases (depth ≤3, ≤10) */
  if(depth<3){
   const f5=document.createElement('div');f5.className='fld';
   f5.innerHTML=`<label>${t('aliases')} <span style="text-transform:none;letter-spacing:0;font-weight:400">· ${t('max_alias')}</span></label><div id="albox"></div>
    <button class="chip add" style="margin-top:8px">${UI_IC.plus} ${t('add_alias').replace('+ ','')}</button>`;
   const ab=f5.querySelector('#albox');
   for(const a of (node.aliases||[])){
    const row=document.createElement('div');row.className='tagline';
    row.innerHTML=`<span style="color:${colorVar(a.color)}">${icon(a.icon,16)}</span><b>${esc(a.name)}</b>
     <button class="x">${UI_IC.x}</button>`;
    row.querySelector('b').onclick=()=>pushView(viewObjectEditor(a,parentObj||node,depth+1));
    row.querySelector('.x').onclick=()=>confirmDlg(t('confirm_del'),()=>{
     node.aliases=node.aliases.filter(x=>x.id!==a.id);saveConfig();refreshTop()});
    ab.appendChild(row)}
   f5.querySelector('.chip.add').onclick=()=>{
    node.aliases=node.aliases||[];
    if(node.aliases.length>=10){toast('≤10');return}
    const a={id:uuid('al'),name:'',icon:node.icon,color:node.color,properties:[],aliases:[]};
    node.aliases.push(a);saveConfig();
    pushView(viewObjectEditor(a,parentObj||node,depth+1))};
   el.appendChild(f5)}
  /* delete object (root only) */
  if(!parentObj){
   const db=document.createElement('button');db.className='del-link';db.textContent=t('del');
   db.onclick=()=>confirmDlg(t('confirm_del'),()=>{
    Config.objects=Config.objects.filter(x=>x.id!==node.id);
    Config.canvases.forEach(cv=>{cv.cells=cv.cells.map(c=>c===node.id?null:c)});
    Config.canvases=Config.canvases.filter(cv=>cv.scope!=='alias'||cv.ownerId!==node.id);
    saveConfig();popView()});
   el.appendChild(db)}
 }}}

/* ================= Canvas Manager ================= */
function viewCanvasMgr(){return{title:t('mgr_canvas'),render:el=>{
 el.innerHTML=`<div class="sec-lab">${t('home_grid')}</div><div id="homeCfg"></div>
  <div class="sec-lab">${t('alias_grids')}</div><div id="aliasCfg"></div>`;
 const home=Config.canvases.find(c=>c.scope==='home');
 el.querySelector('#homeCfg').appendChild(gridEditor(home,
  ()=>Config.objects.map(o=>({id:o.id,name:o.name,icon:o.icon,color:o.color}))));
 const ac=el.querySelector('#aliasCfg');
 const withAliases=[];
 (function walk(nodes,root){for(const n of nodes){
   if((n.aliases||[]).length){withAliases.push({node:n,root});walk(n.aliases,root)}}})(Config.objects.map(o=>o),null);
 // root objects with aliases + nested alias nodes with sub-aliases
 for(const{node}of withAliases){
  let cv=canvasFor(node.id);
  if(!cv){cv={id:'cv_'+node.id,scope:'alias',ownerId:node.id,
   columns:Math.min(3,node.aliases.length||1),rows:Math.ceil((node.aliases.length||1)/3),
   cells:node.aliases.map(a=>a.id)};Config.canvases.push(cv);saveConfig()}
  const lab=document.createElement('div');
  lab.style.cssText='font-weight:600;font-size:13.5px;margin:8px 4px 6px;color:var(--muted)';
  lab.textContent=node.name;ac.appendChild(lab);
  ac.appendChild(gridEditor(cv,()=>node.aliases.map(a=>({id:a.id,name:a.name,icon:a.icon,color:a.color}))))}
}}}
function gridEditor(cv,candidatesFn){
 const wrap=document.createElement('div');wrap.className='xc-card';
 const paint=()=>{
  const need=cv.columns*cv.rows;
  while(cv.cells.length<need)cv.cells.push(null);
  const gap=cv.gap!=null?cv.gap:12;
  const numSt='width:56px;background:var(--surface2);border:1px solid var(--line2);border-radius:8px;color:var(--text);padding:8px;font-family:var(--font-m)';
  wrap.innerHTML=`<div class="row" style="display:flex;gap:10px;margin-bottom:12px">
    <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px">${t('cols')}
     <input type="number" min="1" max="6" value="${cv.columns}" data-c style="${numSt}"></label>
    <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px">${t('rows')}
     <input type="number" min="1" max="12" value="${cv.rows}" data-r style="${numSt}"></label>
   </div>
   <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:13px">
    <label class="slr">${t('gap')}<input type="range" min="4" max="28" value="${gap}" data-g><span data-gv>${gap}px</span></label>
    <label class="slr">${t('width')}<input type="range" min="60" max="190" step="5" value="${cv.cellW||60}" data-w><span data-wv>${cv.cellW?cv.cellW+'px':t('auto')}</span></label>
    <label class="slr">${t('height')}<input type="range" min="60" max="190" step="5" value="${cv.cellH||60}" data-h><span data-hv>${cv.cellH?cv.cellH+'px':t('auto')}</span></label>
   </div><div class="cellpick" style="overflow-x:auto"></div>`;
  const cp=wrap.querySelector('.cellpick');
  /* live preview of container dimensions (v1.4) */
  const applyDims=()=>{
   cp.style.gap=(cv.gap!=null?cv.gap:12)+'px';
   cp.style.gridTemplateColumns=cv.cellW?`repeat(${cv.columns},${cv.cellW}px)`:`repeat(${cv.columns},1fr)`;
   cp.style.justifyContent=cv.cellW?'center':'stretch';
   cp.querySelectorAll('.cp').forEach(c=>{
    if(cv.cellH){c.style.aspectRatio='auto';c.style.height=cv.cellH+'px'}
    else{c.style.aspectRatio='1';c.style.height=''}})};
  wrap.querySelector('[data-c]').onchange=e=>{cv.columns=Math.max(1,Math.min(6,+e.target.value||1));saveConfig();paint()};
  wrap.querySelector('[data-r]').onchange=e=>{cv.rows=Math.max(1,Math.min(12,+e.target.value||1));saveConfig();paint()};
  const g=wrap.querySelector('[data-g]'),w=wrap.querySelector('[data-w]'),h=wrap.querySelector('[data-h]');
  g.oninput=()=>{cv.gap=+g.value;wrap.querySelector('[data-gv]').textContent=g.value+'px';applyDims()};
  w.oninput=()=>{cv.cellW=+w.value<=60?null:+w.value;
   wrap.querySelector('[data-wv]').textContent=cv.cellW?cv.cellW+'px':t('auto');applyDims()};
  h.oninput=()=>{cv.cellH=+h.value<=60?null:+h.value;
   wrap.querySelector('[data-hv]').textContent=cv.cellH?cv.cellH+'px':t('auto');applyDims()};
  g.onchange=w.onchange=h.onchange=()=>saveConfig();
  for(let i=0;i<need;i++){
   const id=cv.cells[i];
   const cand=candidatesFn().find(x=>x.id===id);
   const cell=document.createElement('div');cell.className='cp'+(cand?' filled':'');
   cell.innerHTML=cand?`<span style="color:${colorVar(cand.color)}">${icon(cand.icon,18)}</span><span>${esc(cand.name)}</span>`:`<span>${UI_IC.plus}</span><span>${t('cell_empty')}</span>`;
   cell.onclick=()=>openSheet((sh,close)=>{
    sh.insertAdjacentHTML('beforeend',`<h3>${t('pick_for_cell')}</h3><div id="cands"></div>
     <button class="mini-btn" id="clearC" style="width:100%;padding:12px;margin-top:6px">${t('clear_cell')}</button>`);
    const cb=sh.querySelector('#cands');
    for(const c of candidatesFn()){
     const b=document.createElement('button');b.className='rowbtn';
     b.innerHTML=`<div class="ric" style="color:${colorVar(c.color)}">${icon(c.icon,18)}</div><div class="rl"><b>${esc(c.name)}</b></div>`;
     b.onclick=()=>{cv.cells[i]=c.id;saveConfig();close();paint()};cb.appendChild(b)}
    sh.querySelector('#clearC').onclick=()=>{cv.cells[i]=null;saveConfig();close();paint()}});
   cp.appendChild(cell)}
  applyDims()};
 paint();return wrap}

/* ================= init ================= */
function buildTabs(){
 const bar=$('#tabbar');bar.innerHTML='';
 for(const tab of ['canvas','today','exchange','settings']){
  const b=document.createElement('button');b.dataset.tab=tab;
  b.innerHTML=UI_IC[tab]+`<span>${t(tab)}</span>`;
  b.classList.toggle('active',tab===currentTab);
  b.onclick=()=>switchTab(tab);
  bar.appendChild(b)}}
(async function(){
 loadConfig();
 applyTheme();
 await idbOpen();
 await maybeLock();
 buildTabs();
 switchTab('canvas');
 if('serviceWorker' in navigator&&/^https?:/.test(location.protocol)){
  navigator.serviceWorker.register('sw.js').catch(()=>{})}
})();
</script>
